<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Del Sole Apartments Rab</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #222;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 20px;
    display: flex;
    justify-content: center;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

/* FLAGS */
.flags {
    position: absolute;
    right: 20px;
    display: flex;
    gap: 10px;
}

.flags img {
    width: 24px;
    cursor: pointer;
    opacity: 0.7;
    transition: 0.3s;
}

.flags img:hover {
    opacity: 1;
    transform: scale(1.1);
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.3)),
    url('image1C.png') center/cover fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

.hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4.5rem;
}

/* BUTTON */
.btn {
    padding: 14px 30px;
    border-radius: 30px;
    text-decoration: none;
    display: inline-block;
    margin-top: 25px;
    background: #BFA06F;
    color: white;
}

/* SECTION */
.section {
    padding: 120px 10%;
    display: flex;
    gap: 60px;
    flex-wrap: wrap;
}

.section img {
    width: 45%;
    border-radius: 16px;
}

.text {
    width: 45%;
}

/* GALLERY */
.gallery-advanced {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    padding: 80px 10%;
}

.gallery-advanced img {
    width: 100%;
    border-radius: 15px;
    opacity: 0;
    transform: translateY(60px) scale(0.92);
    transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}

.gallery-advanced img.show {
    opacity: 1;
    transform: translateY(0);
}

/* WHATSAPP */
.floating-buttons {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.float-icon {
    width: 48px;
    opacity: 0.85;
}

/* MOBILE */
@media (max-width: 600px) {
    nav { display: none; }
    .section { flex-direction: column; }
    .section img, .text { width: 100%; }
}

</style>
</head>

<body>

<nav>
<div class="flags">
<img src="https://flagcdn.com/w20/gb.png" onclick="changeLang('en')">
<img src="https://flagcdn.com/w20/it.png" onclick="changeLang('it')">
<img src="https://flagcdn.com/w20/de.png" onclick="changeLang('de')">
<img src="https://flagcdn.com/w20/hu.png" onclick="changeLang('hu')">
<img src="https://flagcdn.com/w20/sk.png" onclick="changeLang('sk')">
<img src="https://flagcdn.com/w20/hr.png" onclick="changeLang('hr')">
</div>
</nav>

<section class="hero">
<div>
<h1 id="title">Del Sole Apartments</h1>
<p id="subtitle">A peaceful retreat by the sea.</p>
<a class="btn" id="btnBook" href="https://www.booking.com/hotel/hr/apartments-rakip.html" target="_blank">Check Availability</a>
</div>
</section>

<section class="section">
<div class="text">
<h2 id="expTitle">Moments by the sea</h2>
<p id="expText">Wake up to sea views.</p>
</div>
<img src="balconyview.png">
</section>

<section class="gallery-advanced">
<img src="balcony.png">
<img src="parking2.png">
<img src="kitchen.png">
</section>

<div class="floating-buttons">
<a href="https://wa.me/385981676499?v=2&text=Hi%20I%20want%20to%20book" target="_blank">
<img class="float-icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>
</div>

<script>

/* SCROLL ANIMATION */
const imgs = document.querySelectorAll('.gallery-advanced img');
window.addEventListener('scroll', () => {
 imgs.forEach((img,i)=>{
  if(img.getBoundingClientRect().top < window.innerHeight - 50){
    setTimeout(()=>img.classList.add('show'), i*150);
  }
 });
});

/* TRANSLATIONS */
const translations = {
 en:{title:"Del Sole Apartments",subtitle:"A peaceful retreat by the sea.",btn:"Check Availability",expTitle:"Moments by the sea",expText:"Wake up to sea views."},
 it:{title:"Appartamenti Del Sole",subtitle:"Un rifugio tranquillo sul mare.",btn:"Verifica disponibilità",expTitle:"Momenti sul mare",expText:"Svegliati con vista mare."},
 de:{title:"Del Sole Apartments",subtitle:"Ein ruhiger Rückzugsort am Meer.",btn:"Verfügbarkeit prüfen",expTitle:"Momente am Meer",expText:"Aufwachen mit Meerblick."},
 hu:{title:"Del Sole Apartmanok",subtitle:"Nyugodt pihenés a tenger mellett.",btn:"Elérhetőség",expTitle:"Pillanatok a tengernél",expText:"Ébredj tengerre néző kilátással."},
 sk:{title:"Del Sole Apartmány",subtitle:"Pokojné miesto pri mori.",btn:"Dostupnosť",expTitle:"Momenty pri mori",expText:"Zobuď sa s výhľadom na more."},
 hr:{title:"Del Sole Apartmani",subtitle:"Miran odmor uz more.",btn:"Provjeri dostupnost",expTitle:"Trenuci uz more",expText:"Probudite se uz pogled na more."}
};

function changeLang(lang){
 document.getElementById("title").innerText = translations[lang].title;
 document.getElementById("subtitle").innerText = translations[lang].subtitle;
 document.getElementById("btnBook").innerText = translations[lang].btn;
 document.getElementById("expTitle").innerText = translations[lang].expTitle;
 document.getElementById("expText").innerText = translations[lang].expText;
}

/* AUTO DETECT LANGUAGE */
const userLang = navigator.language.substring(0,2);

if(translations[userLang]){
    changeLang(userLang);
} else {
    changeLang("en");
}

</script>

</body>
</html>

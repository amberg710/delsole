<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Del Sole Apartments Rab</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 20px;
    display: flex;
    justify-content: center;
    gap: 40px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

nav a {
    text-decoration: none;
    color: #333;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.3)),
    url('image1C.png') center/cover fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

/* BUTTON */
.btn {
    padding: 14px 30px;
    border-radius: 30px;
    text-decoration: none;
    display: inline-block;
    margin-top: 25px;
    background: #BFA06F;
    color: white;
}

/* SECTION */
.section {
    padding: 120px 10%;
    display: flex;
    gap: 60px;
    flex-wrap: wrap;
}

.section img {
    width: 45%;
}

.text {
    width: 45%;
}

/* GALLERY */
.gallery-advanced {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 15px;
    padding: 80px 10%;
}

.gallery-advanced img {
    width: 100%;
    opacity: 0;
    transform: translateY(60px);
    transition: 0.6s;
}

.gallery-advanced img.show {
    opacity: 1;
    transform: translateY(0);
}

.gallery-advanced img:hover {
    transform: scale(1.05);
}

/* MOBILE */
@media(max-width:600px){
    nav{display:none;}
    .gallery-advanced{
        display:flex;
        overflow-x:auto;
    }
    .gallery-advanced img{
        min-width:85%;
    }
    .section{
        flex-direction:column;
    }
    .text,.section img{
        width:100%;
    }
}

/* MAP */
iframe{
    border-radius:12px;
}

/* WHATSAPP FIX */
.floating-buttons{
    position:fixed;
    bottom:20px;
    right:20px;
}

.float-icon{
    width:38px;
    height:38px;
}

.float-icon img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* subtle pulse */
.whatsapp-icon{
    animation:pulse 2.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.06);}
    100%{transform:scale(1);}
}

</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#experience">Experience</a>
<a href="#amenities">Amenities</a>
<a href="#location">Location</a>
<a href="#contact">Book</a>
</nav>

<section id="home" class="hero">
<div>
<h1>Del Sole Apartments</h1>
<p>A peaceful retreat in Supetarska Draga where the sea defines your stay.</p>

<!-- BOOKING BUTTON BACK -->
<a class="btn" href="https://www.booking.com/hotel/hr/apartments-rakip.html" target="_blank">
Check Availability
</a>

</div>
</section>

<section id="experience" class="section">
<div class="text">
<h2>Moments by the sea</h2>
<p>Wake up to sea views.</p>
</div>
<img src="balconyview.png">
</section>

<section id="amenities" class="section">
<img src="bedroom.png">
<div class="text">
<h2>Comfort and simplicity</h2>
<p>Fully equipped apartments.</p>
</div>
</section>

<section class="gallery-advanced">
<img src="balcony.png">
<img src="parking2.png">
<img src="parkingnight.png">
<img src="kitchen.png">
<img src="bedroom.png">
<img src="balconyview.png">
<img src="seaview.png">
</section>

<section id="location" class="section">
<div class="text">
<h2>Location</h2>
<p>Rab Island</p>
</div>

<iframe src="https://www.google.com/maps?q=44.8032,14.7067&z=14&output=embed"
width="100%" height="400"></iframe>
</section>

<section id="contact"></section>

<!-- WHATSAPP -->
<div class="floating-buttons">
<a href="https://wa.me/385981676499" target="_blank" class="float-icon whatsapp-icon">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>
</div>

<script>

/* GALLERY ANIMATION */
const imgs=document.querySelectorAll('.gallery-advanced img');

window.addEventListener('scroll',()=>{
 imgs.forEach((img,i)=>{
  if(img.getBoundingClientRect().top<window.innerHeight-50){
   setTimeout(()=>img.classList.add('show'),i*100);
  }
 });
});

</script>

</body>
</html>

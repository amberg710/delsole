<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Del Sole Apartments</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #111;
    color: white;
    overflow-x: hidden;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('image1C.png') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-size: 4rem;
    font-weight: 300;
    letter-spacing: 2px;
}

/* SCROLL SECTION */
.section {
    padding: 120px 10%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 40px;
}

.section img {
    width: 50%;
    border-radius: 20px;
}

.text {
    width: 50%;
}

.text h2 {
    font-size: 2.5rem;
    font-weight: 300;
}

.text p {
    color: #ccc;
}

/* FULL IMAGE */
.full {
    height: 100vh;
    background: url('seaview.png') center/cover;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    display: inline-block;
    padding: 12px 25px;
    border: 1px solid white;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}

/* CONTACT */
.contact {
    text-align: center;
    padding: 100px 20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>Del Sole</h1>
</div>

<!-- STORY 1 -->
<div class="section">
<div class="text">
<h2>Wake up to the sea</h2>
<p>Experience calm mornings and peaceful sunsets in Supetarska Draga.</p>
</div>
<img src="bedroom.png">
</div>

<!-- STORY 2 -->
<div class="section">
<img src="balconyview.png">
<div class="text">
<h2>Your private view</h2>
<p>Enjoy your coffee overlooking the Adriatic Sea.</p>
</div>
</div>

<!-- FULL IMAGE BREAK -->
<div class="full"></div>

<!-- STORY 3 -->
<div class="section">
<div class="text">
<h2>Modern comfort</h2>
<p>Fully equipped kitchen and stylish interiors.</p>
</div>
<img src="kitchen.png">
</div>

<!-- CONTACT -->
<div class="contact">
<h2>Book your stay</h2>

<a class="btn" href="https://api.whatsapp.com/send?text=Hello%20I%20want%20to%20book%20Del%20Sole%20Apartments" target="_blank">
Book via WhatsApp
</a>

</div>

</body>
</html>

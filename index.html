<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Del Sole Apartments Rab</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BASE */
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
}

/* FIX NAV OFFSET */
section {
    scroll-margin-top: 100px;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 20px;
    display: flex;
    justify-content: center;
    gap: 40px;
    background: rgba(255,255,255,0.9);
    z-index: 1000;
}

nav a {
    text-decoration: none;
    color: #333;
}

/* FLAGS */
.flags {
    position: absolute;
    right: 20px;
    display: flex;
    gap: 8px;
}

.flags img {
    width: 20px;
    cursor: pointer;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('image1C.png') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    padding-top: 60px;
}

/* SECTION */
.section {
    padding: 100px 10%;
    display: flex;
    gap: 50px;
    align-items: center;
    flex-wrap: wrap;
}

.section img {
    width: 45%;
    max-width: 500px;
}

.text {
    width: 45%;
}

/* GALLERY */
.gallery-advanced {
    max-width: 1200px;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 15px;
    padding: 80px 10%;
}

/* FIXED ANIMATION */
.gallery-advanced img {
    width: 100%;
    border-radius: 15px;
    opacity: 0;
    transform: translateY(60px) scale(0.95);
    transition: all 0.9s cubic-bezier(0.22, 1, 0.36, 1);
}

/* MOBILE FIX */
@media (max-width: 600px) {
    nav { display:none; }

    .gallery-advanced {
        display: flex;
        overflow-x: auto;
        gap: 15px;
        padding: 50px 20px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
    }

    .gallery-advanced img {
        min-width: 85%;
        scroll-snap-align: center;
    }

    .section {
        flex-direction: column;
    }

    .text, .section img {
        width:100%;
    }
}

/* MAP */
.map-container {
    width:45%;
    max-width:500px;
}

/* WHATSAPP FIX */
.floating-buttons {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.float-icon {
    width: 48px;
    height: 48px;
}

</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#experience">Experience</a>
<a href="#amenities">Amenities</a>
<a href="#location">Location</a>

<div class="flags">
<img src="https://flagcdn.com/w20/gb.png" onclick="changeLang('en')">
<img src="https://flagcdn.com/w20/de.png" onclick="changeLang('de')">
<img src="https://flagcdn.com/w20/it.png" onclick="changeLang('it')">
<img src="https://flagcdn.com/w20/hr.png" onclick="changeLang('hr')">
</div>
</nav>

<section id="home" class="hero">
<div>
<h1>Del Sole Apartments</h1>
<p>A peaceful retreat by the sea</p>
</div>
</section>

<section id="experience" class="section">
<div class="text">
<h2>Moments by the sea</h2>
<p>Wake up to sea views</p>
</div>
<img src="balconyview.png">
</section>

<section id="amenities" class="section">
<img src="bedroom.png">
<div class="text">
<h2>Comfort</h2>
<p>Fully equipped apartments</p>
</div>
</section>

<!-- FULL GALLERY RESTORED -->
<section class="gallery-advanced">
<img src="balcony.png">
<img src="parking2.png">
<img src="parkingnight.png">
<img src="kitchen.png">
<img src="bedroom.png">
<img src="balconyview.png">
<img src="seaview.png">
</section>

<section id="location" class="section">
<div class="text">
<h2>Location</h2>
<p>Rab Island</p>
</div>

<div class="map-container">
<iframe 
src="https://www.google.com/maps?q=44.8032,14.7067&z=14&output=embed"
width="100%" height="350" style="border:0;">
</iframe>
</div>

</section>

<div class="floating-buttons">
<a target="_blank">
<img class="float-icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>
</div>

<script>

/* ANIMATION */
const imgs = document.querySelectorAll('.gallery-advanced img');

window.addEventListener('scroll', () => {
 imgs.forEach((img,i)=>{
  if(img.getBoundingClientRect().top < window.innerHeight - 50){
   setTimeout(()=>img.style.opacity=1, i*120);
  }
 });
});

/* LANGUAGE + WHATSAPP */
const translations = {
 en:"Hi, I want to book Del Sole Apartment.",
 it:"Ciao, vorrei prenotare.",
 de:"Hallo, ich möchte buchen.",
 hr:"Želim rezervirati.",
 hu:"Szeretnék foglalni.",
 sk:"Chcem rezervovať."
};

let currentLang = "en";

function changeLang(lang){
 currentLang = lang;
 updateWA();
}

function updateWA(){
 document.querySelector(".floating-buttons a").href =
  "https://wa.me/385981676499?text=" + encodeURIComponent(translations[currentLang]);
}

updateWA();

</script>

</body>
</html>

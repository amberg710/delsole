<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Del Sole Apartments Rab</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BASE */
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #222;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 20px;
    display: flex;
    justify-content: center;
    gap: 40px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    z-index: 1000;
    transition: 0.4s;
}

nav a {
    text-decoration: none;
    color: #333;
    font-weight: 500;
    position: relative;
}

nav a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #BFA06F;
    bottom: -5px;
    left: 0;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

/* HAMBURGER */
.hamburger {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 30px;
    height: 22px;
    cursor: pointer;
    z-index: 1100;
    display: none;
}

.hamburger span {
    display: block;
    height: 3px;
    background: #333;
    margin: 5px 0;
    transition: 0.3s;
}

.hamburger.active span:nth-child(1) {
    transform: rotate(45deg) translate(5px, 5px);
}
.hamburger.active span:nth-child(2) {
    opacity: 0;
}
.hamburger.active span:nth-child(3) {
    transform: rotate(-45deg) translate(6px, -6px);
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.3)),
    url('image1C.png') center/cover fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

.hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem;
}

/* BUTTON */
.btn {
    padding: 14px 30px;
    border-radius: 30px;
    text-decoration: none;
    display: inline-block;
    margin-top: 25px;
    transition: 0.3s;
}

.primary {
    background: #BFA06F;
    color: white;
}

.primary:hover {
    transform: translateY(-4px);
}

/* SECTION */
.section {
    padding: 120px 10%;
    display: flex;
    gap: 60px;
    align-items: center;
    flex-wrap: wrap;
}

.section img {
    width: 45%;
    border-radius: 16px;
}

.text { width: 45%; }

.text h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem;
}

.alt { background: #f7f5f2; }

/* GALLERY SLIDER */
.gallery-slider {
    display: flex;
    overflow-x: auto;
    gap: 20px;
    padding: 80px 10%;
    scroll-snap-type: x mandatory;
}

.gallery-slider img {
    width: 70%;
    border-radius: 15px;
    scroll-snap-align: center;
    cursor: pointer;
    transition: 0.4s;
}

.gallery-slider img:hover {
    transform: scale(1.05);
}

/* LIGHTBOX */
#lightbox {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    top: 0;
    left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.4s;
}

#lightbox.show {
    opacity: 1;
    pointer-events: auto;
}

#lightbox img {
    max-width: 90%;
    max-height: 80%;
}

/* FLOAT BUTTONS */
.floating-buttons {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.float-btn {
    padding: 14px 20px;
    border-radius: 30px;
    color: white;
    text-decoration: none;
    animation: float 2s infinite;
}

.booking { background: #BFA06F; }
.whatsapp { background: #25D366; }

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
}

/* MOBILE */
@media (max-width: 768px) {

    nav {
        right: -100%;
        flex-direction: column;
        height: 100vh;
        width: 70%;
        justify-content: center;
        align-items: center;
    }

    nav.show { right: 0; }

    .hamburger { display: block; }

    .section { flex-direction: column; }

    .section img, .text { width: 100%; }

    .gallery-slider img { width: 90%; }
}

</style>
</head>

<body>

<!-- HAMBURGER -->
<div class="hamburger" id="hamburger">
<span></span>
<span></span>
<span></span>
</div>

<!-- NAV -->
<nav id="nav">
<a href="#home">Home</a>
<a href="#experience">Experience</a>
<a href="#amenities">Amenities</a>
<a href="#contact">Book</a>
</nav>

<!-- HERO -->
<section class="hero" id="home">
<div>
<h1>Del Sole Apartments</h1>
<p>Peaceful sea view stay in Rab</p>
<a class="btn primary" href="https://www.booking.com/hotel/hr/apartments-rakip.html" target="_blank">Check Availability</a>
</div>
</section>

<!-- SECTION -->
<section class="section">
<div class="text">
<h2>Moments by the sea</h2>
<p>Wake up to calm sea views.</p>
</div>
<img src="balconyview.png">
</section>

<section class="section alt">
<img src="bedroom.png">
<div class="text">
<h2>Comfort and simplicity</h2>
<p>Fully equipped apartments with balcony.</p>
</div>
</section>

<!-- GALLERY -->
<section class="gallery-slider" id="gallery">
<img src="balconyview.png">
<img src="bedroom.png">
<img src="kitchen.png">
<img src="seaview.png">
<img src="parkingnight.png">
<img src="balcony.png">
</section>

<!-- CONTACT -->
<section class="section" id="contact">
<div class="text">
<h2>Book your stay</h2>
<a class="btn primary" href="https://www.booking.com/hotel/hr/apartments-rakip.html">Book Now</a>
</div>
</section>

<!-- FLOAT BUTTONS -->
<div class="floating-buttons">
<a class="float-btn booking" href="https://www.booking.com/hotel/hr/apartments-rakip.html">Book</a>
<a class="float-btn whatsapp" href="https://wa.link/weiep6" target="_blank">WhatsApp</a>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
<img src="" id="lightbox-img">
</div>

<script>

/* HAMBURGER */
const hamburger = document.getElementById("hamburger");
const nav = document.getElementById("nav");

hamburger.onclick = () => {
    hamburger.classList.toggle("active");
    nav.classList.toggle("show");
};

/* LIGHTBOX */
const images = document.querySelectorAll(".gallery-slider img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

images.forEach(img => {
    img.onclick = () => {
        lightbox.classList.add("show");
        lightboxImg.src = img.src;
    };
});

lightbox.onclick = () => {
    lightbox.classList.remove("show");
};

/* AUTO SLIDE */
const slider = document.querySelector(".gallery-slider");

let scrollAmount = 0;

setInterval(() => {
    scrollAmount += 300;
    if(scrollAmount >= slider.scrollWidth){
        scrollAmount = 0;
    }
    slider.scrollTo({
        left: scrollAmount,
        behavior: "smooth"
    });
}, 3000);

</script>

</body>
</html>

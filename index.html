<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Del Sole Apartments Rab</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.9);
    z-index: 1000;
}

.logo img {
    height: 40px;
}

/* LINKS */
.nav-links {
    display: flex;
    gap: 30px;
}

nav a {
    text-decoration: none;
    color: #333;
}

/* HAMBURGER */
.menu-toggle {
    display: none;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
    z-index: 1100;
}

.menu-toggle span {
    width: 28px;
    height: 3px;
    background: #333;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('image1C.png') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

/* SECTION */
.section {
    padding: 100px 10%;
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    align-items: center;
}

.section img {
    width: 45%;
}

.text {
    width: 45%;
}

/* GALLERY */
.gallery-advanced {
    display: flex;
    overflow-x: auto;
    gap: 15px;
    padding: 40px;
}

.gallery-advanced img {
    width: 80%;
    border-radius: 15px;
}

/* LIGHTBOX */
#lightbox {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: rgba(0,0,0,0.95);
    top: 0;
    left: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
}

#lightbox.show {
    opacity: 1;
    pointer-events: auto;
}

/* MOBILE */
@media (max-width: 768px) {

    .menu-toggle {
        display: flex;
    }

    .nav-links {
        position: fixed;
        top: 60px;
        right: -100%;
        flex-direction: column;
        background: white;
        width: 200px;
        padding: 20px;
        transition: 0.3s;
    }

    .nav-links.active {
        right: 0;
    }

    .section {
        flex-direction: column;
    }

    .section img,
    .text {
        width: 100%;
    }
}

</style>
</head>

<body>

<nav>
<div class="logo">
<img src="logor.png">
</div>

<div class="menu-toggle" id="menuToggle">
<span></span>
<span></span>
<span></span>
</div>

<div class="nav-links" id="navLinks">
<a href="#home">Home</a>
<a href="#experience">Experience</a>
<a href="#location">Location</a>
<a href="#contact">Book</a>
</div>
</nav>

<section class="hero" id="home">
<div>
<h1>Del Sole Apartments</h1>
</div>
</section>

<section class="section" id="experience">
<div class="text">
<h2>Moments by the sea</h2>
<p>Relax near sandy beaches and enjoy peaceful surroundings.</p>
</div>
<img src="balconyview.png">
</section>

<section class="gallery-advanced">
<img src="balconyview.png">
<img src="bedroom.png">
<img src="kitchen.png">
<img src="seaview.png">
</section>

<section id="location" style="padding:80px 10%; text-align:center;">
<h2>Location</h2>

<iframe 
src="https://maps.google.com/maps?q=Supetarska%20Draga%20287&t=k&z=13&output=embed"
width="100%" height="350" style="border-radius:15px;border:none;">
</iframe>

</section>

<section id="contact" style="text-align:center;padding:80px;">
<a href="https://www.booking.com/hotel/hr/apartments-rakip.html">Book Now</a>
</section>

<div id="lightbox">
<img id="lightbox-img">
</div>

<script>

/* MENU FIX */
const toggle = document.getElementById("menuToggle");
const nav = document.getElementById("navLinks");

toggle.addEventListener("click", () => {
    nav.classList.toggle("active");
});

/* LIGHTBOX */
const imgs = document.querySelectorAll('.gallery-advanced img');
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

imgs.forEach(img => {
    img.onclick = () => {
        lightbox.classList.add("show");
        lightboxImg.src = img.src;
    }
});

lightbox.onclick = () => lightbox.classList.remove("show");

</script>

</body>
</html>

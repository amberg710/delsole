<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Del Sole Apartments Rab</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #222;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

/* LOGO */
.logo img {
    height: 40px;
}

/* NAV LINKS */
.nav-links {
    display: flex;
    gap: 40px;
}

nav a {
    text-decoration: none;
    color: #333;
    font-weight: 500;
}

/* HAMBURGER (ALWAYS VISIBLE NOW) */
.menu-toggle {
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
}

.menu-toggle span {
    width: 28px;
    height: 3px;
    background: #333;
    border-radius: 2px;
    transition: 0.3s;
}

/* ANIMATION */
.menu-toggle.active span:nth-child(1) {
    transform: rotate(45deg) translate(5px, 5px);
}
.menu-toggle.active span:nth-child(2) {
    opacity: 0;
}
.menu-toggle.active span:nth-child(3) {
    transform: rotate(-45deg) translate(6px, -6px);
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.3)),
    url('image1C.png') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

.hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem;
}

/* BUTTON */
.btn {
    padding: 14px 30px;
    border-radius: 30px;
    text-decoration: none;
    display: inline-block;
    margin-top: 20px;
}

.primary {
    background: #BFA06F;
    color: white;
}

/* SECTION */
.section {
    padding: 100px 10%;
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    align-items: center;
}

.section img {
    width: 45%;
    border-radius: 15px;
}

.text {
    width: 45%;
}

/* MOBILE MENU */
.nav-links.mobile {
    position: fixed;
    top: 70px;
    right: -100%;
    flex-direction: column;
    background: white;
    width: 220px;
    padding: 20px;
    transition: 0.3s;
}

.nav-links.mobile.active {
    right: 0;
}

/* GALLERY */
.gallery-advanced {
    display: flex;
    overflow-x: auto;
    gap: 15px;
    padding: 50px 20px;
}

.gallery-advanced img {
    width: 80%;
    border-radius: 15px;
    flex: 0 0 auto;
}

/* LIGHTBOX */
#lightbox {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: rgba(0,0,0,0.95);
    top: 0;
    left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
}

#lightbox.show {
    opacity: 1;
    pointer-events: auto;
}

#lightbox img {
    max-width: 90%;
}

/* MOBILE */
@media (max-width: 768px) {

    .section {
        flex-direction: column;
    }

    .section img,
    .text {
        width: 100%;
    }

    .nav-links {
        display: none;
    }

    .nav-links.mobile {
        display: flex;
    }
}

</style>
</head>

<body>

<nav>

<div class="logo">
<img src="logor.png">
</div>

<div class="menu-toggle" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</div>

<div class="nav-links mobile" id="navLinks">
<a href="#home">Home</a>
<a href="#experience">Experience</a>
<a href="#amenities">Amenities</a>
<a href="#contact">Book</a>
</div>

</nav>

<section class="hero" id="home">
<div>
<h1>Del Sole Apartments</h1>
<a class="btn primary" href="#">Check Availability</a>
</div>
</section>

<section class="section">
<div class="text">
<h2>Moments by the sea</h2>
<p>Relax and enjoy peaceful surroundings just steps from the beach.</p>
</div>
<img src="balconyview.png">
</section>

<section class="gallery-advanced">
<img src="balconyview.png">
<img src="bedroom.png">
<img src="kitchen.png">
<img src="seaview.png">
<img src="parkingnight.png">
<img src="balcony.png">
</section>

<div id="lightbox">
<img id="lightbox-img">
</div>

<script>

/* MENU FIX */
function toggleMenu(){
    const nav = document.getElementById("navLinks");
    const toggle = document.querySelector(".menu-toggle");

    nav.classList.toggle("active");
    toggle.classList.toggle("active");
}

/* LIGHTBOX */
const imgs = document.querySelectorAll('.gallery-advanced img');
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

imgs.forEach(img => {
    img.onclick = () => {
        lightbox.classList.add("show");
        lightboxImg.src = img.src;
    }
});

lightbox.onclick = () => lightbox.classList.remove("show");

</script>

</body>
</html>

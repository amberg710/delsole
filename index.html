<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Del Sole Apartments | Rab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #E6E3DF;
    color: #333;
    scroll-behavior: smooth;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 15px;
    text-align: center;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    z-index: 1000;
}

nav a {
    margin: 0 20px;
    text-decoration: none;
    color: #222;
    font-weight: 500;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('YOUR_IMAGE_4.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

.hero h1 {
    font-size: 3.5rem;
}

.hero p {
    font-size: 1.2rem;
}

/* BUTTON */
.btn {
    padding: 12px 25px;
    background: #BFA06F;
    color: white;
    border-radius: 30px;
    text-decoration: none;
    display: inline-block;
    margin-top: 20px;
}

/* SECTIONS */
section {
    padding: 80px 20px;
    max-width: 1100px;
    margin: auto;
}

/* CARDS */
.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    margin: 20px 0;
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 15px;
}

.gallery img {
    width: 100%;
    border-radius: 15px;
    transition: 0.4s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 60px;
    height: 60px;
    background: #25D366;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 28px;
    text-decoration: none;
}
</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#apartments">Apartments</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<div class="hero" id="home">
<div>
<h1>Del Sole Apartments</h1>
<p>Sea. Nature. Relaxation.</p>
<a href="#contact" class="btn">Book Now</a>
</div>
</div>

<!-- APARTMENTS -->
<section id="apartments">
<h2>Our Apartments</h2>

<div class="card">
<h3>Apartment with Sea View</h3>
<p>Bright, modern, with balcony overlooking the sea</p>
</div>

<div class="card">
<h3>Family Apartment</h3>
<p>Spacious and comfortable for families</p>
</div>

</section>

<!-- GALLERY -->
<section id="gallery">
<h2>Gallery</h2>

<div class="gallery">
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
<img src="img5.jpg">
<img src="img6.jpg">
</div>

</section>

<!-- CONTACT -->
<section id="contact">
<h2>Contact</h2>

<p>delsolerab@gmail.com</p>

<a class="btn" href="https://api.whatsapp.com/send?text=https://maps.app.goo.gl/ELyB5f3uSsg95Wh27" target="_blank">
Chat on WhatsApp
</a>

</section>

<!-- WHATSAPP FLOAT -->
<a class="whatsapp" href="https://api.whatsapp.com/send?text=https://maps.app.goo.gl/ELyB5f3uSsg95Wh27" target="_blank">
💬
</a>

</body>
</html>

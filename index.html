<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Del Sole Apartments Rab</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #222;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    height: 40px;
}

/* NAV LINKS */
.nav-links {
    display: flex;
    gap: 30px;
}

nav a {
    text-decoration: none;
    color: #333;
    font-weight: 500;
    position: relative;
}

nav a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #BFA06F;
    bottom: -5px;
    left: 0;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

/* HAMBURGER */
.menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.3)),
    url('image1C.png') center/cover fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    padding: 0 20px;
}

.hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4.5rem;
    animation: fadeUp 1s ease;
}

/* BUTTON */
.btn {
    padding: 14px 30px;
    border-radius: 30px;
    text-decoration: none;
    display: inline-block;
    margin-top: 25px;
    transition: 0.3s;
}

.primary {
    background: #BFA06F;
    color: white;
}

.primary:hover {
    transform: translateY(-4px) scale(1.05);
}

/* SECTION */
.section {
    padding: 120px 10%;
    display: flex;
    gap: 60px;
    align-items: center;
    flex-wrap: wrap;
}

.section img {
    width: 45%;
    border-radius: 16px;
    transition: 0.5s;
}

.section img:hover {
    transform: scale(1.05);
}

.text {
    width: 45%;
}

/* GALLERY SWIPE */
.gallery-advanced {
    display: flex;
    overflow-x: auto;
    gap: 15px;
    padding: 60px 20px;
    scroll-snap-type: x mandatory;
}

.gallery-advanced img {
    width: 80%;
    flex: 0 0 auto;
    border-radius: 15px;
    scroll-snap-align: center;
    transition: 0.4s;
}

.gallery-advanced img:hover {
    transform: scale(1.05);
}

/* LIGHTBOX */
#lightbox {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: rgba(0,0,0,0.95);
    top: 0;
    left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.4s;
}

#lightbox.show {
    opacity: 1;
    pointer-events: auto;
}

#lightbox img {
    max-width: 90%;
    max-height: 80%;
}

/* ANIMATIONS */
@keyframes fadeUp {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}

/* MOBILE */
@media (max-width: 768px) {

    .nav-links {
        position: fixed;
        top: 70px;
        right: -100%;
        flex-direction: column;
        background: white;
        width: 200px;
        padding: 20px;
        transition: 0.3s;
    }

    .nav-links.active {
        right: 0;
    }

    .menu-toggle {
        display: block;
    }

    .section {
        flex-direction: column;
        text-align: center;
    }

    .section img,
    .text {
        width: 100%;
    }

    .hero h1 {
        font-size: 2.2rem;
    }

    .gallery-advanced img {
        width: 90%;
    }
}

</style>
</head>

<body>

<nav>
<div class="logo">
<img src="logor.png">
</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<div class="nav-links" id="navLinks">
<a href="#home">Home</a>
<a href="#experience">Experience</a>
<a href="#amenities">Amenities</a>
<a href="#location">Location</a>
<a href="#contact">Book</a>
</div>
</nav>

<section class="hero" id="home">
<div>
<h1>Del Sole Apartments</h1>
<a class="btn primary" href="https://www.booking.com/hotel/hr/apartments-rakip.html" target="_blank">
Check Availability
</a>
</div>
</section>

<section class="section">
<div class="text">
<h2>Moments by the sea</h2>
<p>Wake up to sea views and enjoy peaceful surroundings.</p>
</div>
<img src="balconyview.png">
</section>

<section class="gallery-advanced">
<img src="balconyview.png">
<img src="bedroom.png">
<img src="kitchen.png">
<img src="seaview.png">
<img src="parkingnight.png">
<img src="balcony.png">
</section>

<div id="lightbox">
<img id="lightbox-img">
</div>

<script>

/* MENU */
function toggleMenu(){
    document.getElementById("navLinks").classList.toggle("active");
}

/* LIGHTBOX */
const imgs = document.querySelectorAll('.gallery-advanced img');
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

imgs.forEach(img => {
    img.onclick = () => {
        lightbox.classList.add("show");
        lightboxImg.src = img.src;
    }
});

lightbox.onclick = () => lightbox.classList.remove("show");

</script>

</body>
</html>
